<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Aruu ❤️</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Floating Hearts -->
<div id="hearts"></div>

<!-- Hero Section -->
<section class="hero">

    <h1>Happy Birthday</h1>

    <h2 class="glowName">
     Aruu ❤️ 
    </h2>

    <p class="subtitle">
        Every second brings us closer to your special moment...
    </p>

    <!-- Countdown -->
    <div id="countdown">

        <div class="time-box">
            <h3 id="days">00</h3>
            <span>Days</span>
        </div>

        <div class="time-box">
            <h3 id="hours">00</h3>
            <span>Hours</span>
        </div>

        <div class="time-box">
            <h3 id="minutes">00</h3>
            <span>Minutes</span>
        </div>

        <div class="time-box">
            <h3 id="seconds">00</h3>
            <span>Seconds</span>
        </div>

    </div>

    <!-- Question Box -->
    <div id="questionBox">

        <h2>
            🎁 Are you ready for your Birthday Surprise?
        </h2>

        <div class="buttons">

            <button id="yesBtn">
                💖 Yes, Open It
            </button>

            <button id="noBtn">
                🙈 Maybe Later
            </button>

        </div>

    </div>

</section>

<!-- Surprise Page -->
<<!-- ===============================
     SURPRISE PAGE
================================ -->

<section id="surprise">

    <div class="scrollContainer">

        <!-- Top Roll -->
        <div class="roll topRoll"></div>

        <!-- Letter -->
        <div class="letter" id="letter">

            <h1>Happy Birthday Aruu ❤️</h1>

            <h2>Dear Aruu,</h2>

            <div id="typing"></div>

        </div>

        <!-- Bottom Roll -->
        <div class="roll bottomRoll"></div>

    </div>

</section>

<!-- Fireworks Canvas -->
<canvas id="fireworks"></canvas>
</section><!-- Fireworks -->
<canvas id="fireworks"></canvas>

<!-- JavaScript -->
<script src="script.js"></script>
<audio id="birthdayMusic" loop>
    <source src="videoplayback.m4a" type="audio/mp4">
</audio>

</body>
</html>
